services:
  mcfb:
    build:
      context: .
      dockerfile: |
        FROM python:3.12.0-slim
        RUN apt-get update && \
            apt-get install -y --no-install-recommends git && \
            apt-get clean && \
            rm -rf /var/lib/apt/lists/* && \
            useradd -m mcfuser
        USER mcfuser
        WORKDIR /mcfb
        COPY --chown=mcfuser:mcfuser entrypoint.sh /entrypoint.sh
        RUN chmod +x /entrypoint.sh
        ENTRYPOINT ["/entrypoint.sh"]
    image: mcfb:latest
    container_name: MasterCryptoFarmBot
    restart: unless-stopped
    volumes:
      - ${MCF_PATH:-~/.MCF/container}:/mcfb
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Europe/London}
    ports:
      - "1337:1337"
    init: true
    network_mode: bridge
    healthcheck:
      test: ["CMD-SHELL", "test -f /mcfb/main.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

configs:
  entrypoint_script:
    content: |
      #!/bin/bash
      set -e
      if [ ! -f main.py ]; then
          echo 'Cloning repository ...'
          git clone https://github.com/masterking32/MasterCryptoFarmBot.git ./
      fi
      git config --global --add safe.directory /mcfb
      if [ ! -f config.py ]; then
          echo 'Copying config from sample ...'
          cp config.py.sample config.py
      fi
      if [ -f start_linux.sh ]; then
          echo 'Launching ...'
          bash start_linux.sh
      else
          echo 'start_linux.sh not found. Exiting.'
          exit 1
      fi
